const LETTERS = ["a","b","c","d","e"];
function tagLabel(cat) {
  return {muscles:"Muscles",cardio:"Cardio-Vasculaire",filières:"Filières Énergétiques",neuro:"Neuro-Endocrino",respiration:"Respiration",autres:"Physiologie Générale"}[cat]||cat;
}

function renderCards(filtered) {
  const grid = document.getElementById('grid');
  document.getElementById('counter').textContent = filtered.length + ' / ' + questions.length;
  if (!filtered.length) { grid.innerHTML='<div class="no-results">Aucune question trouvée.</div>'; return; }
  grid.innerHTML = filtered.map((q,i)=>{
    const opts = q.opts.map((o,j)=>{
      const ok = j===q.correct;
      return `<div class="option ${ok?'correct':''}">
        <span class="opt-marker">${LETTERS[j]}</span>
        <span>${o}${ok?'&nbsp;&nbsp;<span class="correct-label">Bonne réponse</span>':''}</span>
      </div>`;
    }).join('');
    const imgEl = q.img ? `<img class="q-img" src="${q.img}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : '';
    const phEl  = `<div class="q-img-placeholder" style="${q.img?'display:none':''}">🔬</div>`;
    return `<div class="card" data-cat="${q.cat}">
      <div class="card-top">
        <div>
          <div class="q-meta"><div class="q-num">${i+1}</div><span class="q-tag">${tagLabel(q.cat)}</span></div>
          <div class="q-text">${q.q}</div>
        </div>
        ${imgEl}${phEl}
      </div>
      <div class="options">${opts}</div>
    </div>`;
  }).join('');
}

let curFilter='all', curSearch='';
function applyFilters() {
  let f = questions;
  if (curFilter!=='all') f=f.filter(q=>q.cat===curFilter);
  if (curSearch.trim()) { const s=curSearch.toLowerCase(); f=f.filter(q=>q.q.toLowerCase().includes(s)||q.opts.some(o=>o.toLowerCase().includes(s))); }
  renderCards(f);
}

document.querySelectorAll('.filter-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); curFilter=b.dataset.filter; applyFilters();
  });
});
document.getElementById('search').addEventListener('input',e=>{ curSearch=e.target.value; applyFilters(); });
document.getElementById('total-badge').textContent = questions.length + ' questions';
applyFilters();
</script>
